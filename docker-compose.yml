services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres-vector-store
    env_file:
      - .env
    environment:
      POSTGRES_USER: langchain
      POSTGRES_DB: langchain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  atlassian-mcp:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    container_name: atlassian-mcp
    env_file:
      - .env
    environment:
      JIRA_PROJECTS_FILTER: BA-MCP-Integration
    command: ["--transport", "streamable-http", "--port", "9000", "--host", "0.0.0.0"]
    ports:
      - "9000:9000"

volumes:
  pgdata: